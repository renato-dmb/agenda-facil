name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-and-integration:
    name: Unit + Integration
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: agenda_facil_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U test -d agenda_facil_test"
          --health-interval=2s
          --health-timeout=3s
          --health-retries=20

    env:
      TEST_DATABASE_URL: postgres://test:test@localhost:5433/agenda_facil_test
      DATABASE_URL: postgres://test:test@localhost:5433/agenda_facil_test
      JWT_SECRET: test-jwt-secret-32-chars-minimum-ok
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_TEST }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY_TEST }}
      DEFAULT_TIMEZONE: America/Sao_Paulo
      LOG_LEVEL: silent

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run migrations on test DB
        run: node scripts/setup-test-db.js

      - name: Unit tests
        run: pnpm test:unit

      - name: Integration tests
        run: pnpm test:integration

  e2e-bot:
    name: E2E Bot (Claude real)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: unit-and-integration
    if: ${{ github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'e2e') }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: agenda_facil_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U test -d agenda_facil_test"
          --health-interval=2s
          --health-timeout=3s
          --health-retries=20

    env:
      TEST_DATABASE_URL: postgres://test:test@localhost:5433/agenda_facil_test
      DATABASE_URL: postgres://test:test@localhost:5433/agenda_facil_test
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_TEST }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY_TEST }}
      DEFAULT_TIMEZONE: America/Sao_Paulo
      LOG_LEVEL: silent

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: node scripts/setup-test-db.js
      - name: E2E bot + regressão IA
        run: pnpm test:e2e:bot

  e2e-dashboard:
    name: E2E Dashboard (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: unit-and-integration

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: agenda_facil_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U test -d agenda_facil_test"
          --health-interval=2s
          --health-timeout=3s
          --health-retries=20

    env:
      TEST_DATABASE_URL: postgres://test:test@localhost:5433/agenda_facil_test
      DATABASE_URL: postgres://test:test@localhost:5433/agenda_facil_test
      JWT_SECRET: test-jwt-secret-32-chars-minimum-ok
      BOT_API_URL: http://localhost:3001
      DEFAULT_TIMEZONE: America/Sao_Paulo

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm --filter @agenda-facil/dashboard exec playwright install --with-deps chromium
      - run: node scripts/setup-test-db.js
      - run: pnpm test:e2e:dashboard
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/dashboard/playwright-report/
          retention-days: 7
