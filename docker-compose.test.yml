services:
  postgres-test:
    image: postgres:16-alpine
    container_name: agenda-facil-test-db
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: agenda_facil_test
    ports:
      - '5433:5432'
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U test -d agenda_facil_test']
      interval: 2s
      timeout: 3s
      retries: 20
